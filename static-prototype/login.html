<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | SUMI & ENJI</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <style>
    .auth-wrapper { min-height:100vh; display:flex; background:var(--surface-container-lowest); }
    .auth-img { flex:1; position:relative; display:none; }
    @media(min-width:900px){ .auth-img { display:block; } }
    .auth-img img { width:100%; height:100%; object-fit:cover; }
    .auth-img .overlay { position:absolute; inset:0; background:rgba(0,0,0,.45); }
    .auth-img .brand { position:absolute; bottom:var(--sp-12); left:var(--sp-12); font-family:var(--font-display); font-style:italic; font-size:2rem; color:#fff; }
    .auth-form-panel { width:100%; max-width:480px; padding:var(--sp-16) var(--sp-12); display:flex; flex-direction:column; justify-content:center; }
    .auth-tabs { display:flex; border-bottom:1px solid var(--outline-variant); margin-bottom:var(--sp-10); }
    .auth-tab { flex:1; text-align:center; padding:var(--sp-3) 0; font-family:var(--font-label); font-size:.7rem; letter-spacing:.15em; text-transform:uppercase; color:var(--on-surface-variant); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .2s, border-color .2s; }
    .auth-tab.active { color:var(--primary); border-bottom-color:var(--primary); }
    .auth-panel { display:none; flex-direction:column; gap:var(--sp-6); }
    .auth-panel.active { display:flex; }
    .divider-or { display:flex; align-items:center; gap:var(--sp-4); }
    .divider-or::before,.divider-or::after { content:''; flex:1; height:1px; background:var(--outline-variant); }
    .divider-or span { font-family:var(--font-label); font-size:.6rem; letter-spacing:.15em; text-transform:uppercase; color:var(--outline); }
  </style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-img">
    <img src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?q=80&w=1400&auto=format&fit=crop" alt="Sushi"/>
    <div class="overlay"></div>
    <p class="brand">SUMI &amp; ENJI</p>
    <p style="position:absolute;bottom:var(--sp-6);left:var(--sp-12);font-family:var(--font-label);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);">Traditional Craft, Modern Palate</p>
  </div>
  <div class="auth-form-panel">
    <a href="index.html" class="nav-logo mb-8" style="display:inline-block;">SUMI &amp; ENJI</a>
    <h1 class="headline-lg mb-2">Welcome Back</h1>
    <p class="body-sm text-muted mb-10">おかえりなさい — A journey of taste awaits.</p>
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Sign In</div>
      <div class="auth-tab" data-tab="register">Create Account</div>
    </div>
    <form class="auth-panel active" data-panel="login" id="login-form">
      <div class="form-group"><label class="form-label" for="l-email">Email</label><input class="form-input" type="email" id="l-email" placeholder="name@example.com" required/></div>
      <div class="form-group">
        <div class="flex-between mb-2"><label class="form-label" for="l-pass">Password</label><a href="#" class="link-gold">Forgot?</a></div>
        <input class="form-input" type="password" id="l-pass" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;">Sign In <span class="material-symbols-outlined" style="font-size:.9rem;">arrow_forward</span></button>
      <div class="divider-or"><span>Or continue with</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);">
        <button type="button" class="btn btn-outline" style="justify-content:center; gap:var(--sp-2);"><span class="material-symbols-outlined" style="font-size:1rem;">search</span> Google</button>
        <button type="button" class="btn btn-outline" style="justify-content:center; gap:var(--sp-2);"><span class="material-symbols-outlined" style="font-size:1rem;">smartphone</span> Apple</button>
      </div>
    </form>
    <form class="auth-panel" data-panel="register" id="register-form">
      <div class="form-group"><label class="form-label" for="r-name">Full Name</label><input class="form-input" type="text" id="r-name" placeholder="Kenji Yamamoto" required/></div>
      <div class="form-group"><label class="form-label" for="r-email">Email</label><input class="form-input" type="email" id="r-email" placeholder="name@example.com" required/></div>
      <div class="grid-2"><div class="form-group"><label class="form-label" for="r-pw">Password</label><input class="form-input" type="password" id="r-pw" placeholder="••••••••" required/></div><div class="form-group"><label class="form-label" for="r-cx">Confirm</label><input class="form-input" type="password" id="r-cx" placeholder="••••••••" required/></div></div>
      <label style="display:flex;align-items:flex-start;gap:var(--sp-3);font-size:.8rem;color:var(--on-surface-variant);cursor:pointer;"><input type="checkbox" style="accent-color:var(--primary);margin-top:3px;" required/><span>I agree to the <a href="#" style="border-bottom:1px solid var(--secondary);">Terms &amp; Privacy</a></span></label>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;">Create Account</button>
    </form>
  </div>
</div>
<script src="assets/js/main.js"></script>
<script>
  document.querySelectorAll('.auth-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.auth-panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.querySelector(`[data-panel="${tab.dataset.tab}"]`).classList.add('active');
    });
  });
  ['login-form','register-form'].forEach(id=>document.getElementById(id)?.addEventListener('submit',e=>{e.preventDefault();window.location.href='account.html';}));
</script>
</body>
</html>
